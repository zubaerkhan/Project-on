<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Md Zubaer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="profile-card page-card">
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a class="active" href="contact.html" aria-current="page">Contact</a>
      </nav>
      <p class="eyebrow">CONTACT</p>
      <h1>Let's start a<br />conversation.</h1>
      <div class="line"></div>
      <section class="content-section">
        <h2>Say hello</h2>
        <p>Have an idea, question, or opportunity to share? Leave a message and Md Zubaer will get back to you.</p>
        <form id="contactForm">
          <label for="name">Your name</label>
          <input id="name" name="name" type="text" autocomplete="name" required />
          <label for="message">Your message</label>
          <textarea id="message" name="message" rows="4" required></textarea>
          <button type="submit">Send message <span>&rarr;</span></button>
          <p id="status" class="status" aria-live="polite"></p>
        </form>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
