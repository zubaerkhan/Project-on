<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sajid Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="profile-card">
      <section class="intro">
        <div class="avatar" aria-label="Sajid initials">S</div>
        <div>
          <p class="eyebrow">PERSONAL PROFILE</p>
          <h1>Sajid</h1>
          <p class="role">Creative thinker &amp; lifelong learner</p>
        </div>
      </section>

      <div class="line"></div>

      <section class="about">
        <h2>About me</h2>
        <p>
          Hi, I'm Sajid. I enjoy turning ideas into meaningful experiences and discovering something new every day.
        </p>
      </section>

      <section class="details" aria-label="Profile details">
        <div><span>Location</span><strong>Bangladesh</strong></div>
        <div><span>Interests</span><strong>Design / Technology / Music</strong></div>
      </section>

      <button id="connectButton" type="button">Say hello <span>&rarr;</span></button>
      <p id="status" class="status" aria-live="polite"></p>
    </main>
    <script src="script.js"></script>
  </body>
</html>
